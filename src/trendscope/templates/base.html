<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Trendscope{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between flex-wrap gap-2">
            <a href="index.html" class="text-xl font-bold tracking-tight">Trendscope</a>
            <nav class="text-sm text-slate-600 flex flex-wrap gap-x-4 gap-y-1">
                {% for topic_key, meta in topics.items() %}
                <a href="{{ meta.slug }}.html" class="hover:text-slate-900">{{ meta.display }}</a>
                {% endfor %}
            </nav>
        </div>
    </header>
    <main class="max-w-5xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>
    <footer class="border-t border-slate-200 mt-12 py-6 text-center text-sm text-slate-500">
        Generated {{ generated_at }}
    </footer>
</body>
</html>
