server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;
    gzip on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript text/javascript text/html application/json image/svg+xml;

    # HTML pages: short cache so timer-driven updates surface within ~5min.
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=300, must-revalidate";
        try_files $uri =404;
    }

    # Everything else: longer cache (mostly Tailwind CDN, no other assets today).
    location / {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri $uri/ =404;
    }
}
